<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Now | NoshahiBaba.com</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .shop-hero {
            background: linear-gradient(135deg, #000 0%, #1a1a1a 100%);
            padding: 100px 0;
            text-align: center;
            border-bottom: 2px solid var(--primary);
        }

        .shop-hero h1 {
            font-size: 56px;
            color: var(--primary);
            margin-bottom: 20px;
        }

        .shop-container {
            padding: 80px 0;
            background: #0a0a0a;
            min-height: 100vh;
        }
    </style>
</head>

<body>
        <!-- Consolidated Header & Navigation -->
    <header class="main-header sticky-header">
        <div class="container">
            <!-- First Row: Logo, Search, Actions -->
            <div class="header-top-row">
                <div class="logo">
                    <a href="index.html">
                        <span class="logo-text">Noshahi<span>baba</span>.com</span>
                    </a>
                </div>
                <div class="search-container">
                    <div class="search-box">
                        <div class="search-type">Products <i data-lucide="chevron-down"></i></div>
                        <input type="text" placeholder="What are you looking for...">
                        <button class="search-btn"><i data-lucide="search"></i> <span>Search</span></button>
                    </div>
                </div>
                <div class="header-actions">
                    <a href="signin.html" class="action-item"><i data-lucide="user"></i><span>Sign In</span></a><a
                        href="messages.html" class="action-item"><i
                            data-lucide="message-square"></i><span>Messages</span></a><a href="cart.html"
                        class="action-item"><i data-lucide="shopping-cart"></i><span>Cart</span></a>
                </div>
            </div>

            <!-- Second Row: Attached Navigation -->
            <div class="header-nav-row">
                <div class="all-categories" id="all-categories-btn">
                    <i data-lucide="menu"></i> All categories
                </div>
                <div class="nav-links">
                    <a href="index.html"><i data-lucide="home"></i> Home</a><a
                        href="featured.html">Featured selections</a>
                    <a href="tradeassurance.html">Trade Assurance</a>
                    <a href="buyer-central.html">Buyer Central</a>
                    <a href="helpcenter.html">Help Center</a>
                    <a href="getapp.html">Get the app</a>
                </div>
                <div class="nav-right">
                    <a href="#">Become a supplier</a>
                </div>
            </div>
        </div>
    </header>

    <main>
        <section class="shop-hero">
            <div class="container">
                <h1>All Products</h1>
                <p style="color: rgba(255,255,255,0.7); font-size: 18px;">Discover our full collection with the best
                    wholesale prices.</p>
            </div>
        </section>

        <section class="shop-container">
            <div class="container">
                <div class="product-grid" id="product-container">
                    <!-- Products will be mirrored here -->
                </div>
            </div>
        </section>
    </main>

    <footer id="dynamic-footer"></footer>

    <script src="script.js"></script>
    <script>
        // Basic page logic to show some products
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            // In a real app, this would fetch from a database
            console.log("Shop Now page loaded");
        });
    </script>
</body>

</html>
