<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" href="assets/logo.png" />
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoshahiBaba</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body,
        html {
            min-height: 100%;
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background:
                radial-gradient(circle at top left, rgba(255, 204, 0, 0.18), transparent 28%),
                radial-gradient(circle at bottom right, rgba(251, 146, 60, 0.16), transparent 24%),
                linear-gradient(180deg, #f7f8fc 0%, #eef2f7 100%);
            color: #0f172a;
        }

        .signin-container {
            min-height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 16px;
        }

        .signin-close {
            position: absolute;
            top: 14px;
            right: 14px;
            width: 44px;
            height: 44px;
            border: 1px solid rgba(203, 213, 225, 0.9);
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.92);
            color: #0f172a;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 12px 28px rgba(15, 23, 42, 0.12);
            backdrop-filter: blur(10px);
            z-index: 20;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .signin-close:hover {
            background: #fff;
            transform: scale(1.05);
            box-shadow: 0 16px 34px rgba(15, 23, 42, 0.16);
        }

        .signin-shell {
            width: 100%;
            max-width: 460px;
        }

        .signin-form-area {
            background: transparent;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            position: relative;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid rgba(226, 232, 240, 0.9);
            border-radius: 28px;
            padding: 34px;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
            backdrop-filter: blur(14px);
        }

        .form-header {
            text-align: center;
            margin-bottom: 26px;
        }

        .logo-box {
            margin-bottom: 14px;
            display: inline-block;
        }

        .auth-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 999px;
            background: #fff8db;
            color: #9a6700;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 16px;
        }

        .welcome-text {
            font-size: 30px;
            font-weight: 900;
            color: #0f172a;
            margin-bottom: 8px;
        }

        .sub-text {
            color: #667085;
            font-size: 14px;
            line-height: 1.6;
            max-width: 320px;
            margin: 0 auto;
        }

        .input-group {
            margin-bottom: 18px;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #344054;
            font-size: 13px;
            font-weight: 800;
        }

        .input-group input {
            width: 100%;
            box-sizing: border-box;
            background: #f8fafc;
            border: 1px solid #dbe3ee;
            border-radius: 14px;
            padding: 15px 16px;
            color: #0f172a;
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
            font-weight: 700;
        }

        .input-group input:focus {
            border-color: #f59e0b;
            box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.16);
            background: #fff;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
            font-size: 13px;
        }

        .remember-forgot label {
            color: #667085;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .remember-forgot a {
            color: #f59e0b;
            text-decoration: none;
            font-weight: 800;
        }

        .remember-forgot a:hover {
            text-decoration: underline;
        }

        .signin-button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #f97316 0%, #ffb300 100%);
            color: #111827;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 22px;
        }

        .signin-button:hover {
            box-shadow: 0 14px 28px rgba(249, 115, 22, 0.22);
            transform: translateY(-1px);
        }

        .social-divider {
            text-align: center;
            position: relative;
            margin-bottom: 22px;
        }

        .social-divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: #e2e8f0;
            z-index: 1;
        }

        .social-divider span {
            background: rgba(255, 255, 255, 0.96);
            padding: 0 15px;
            color: #94a3b8;
            font-size: 12px;
            position: relative;
            z-index: 2;
        }

        .social-btns {
            display: flex;
            gap: 12px;
            margin-bottom: 22px;
        }

        .social-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 700;
            color: #0f172a;
        }

        .social-btn:hover {
            box-shadow: 0 10px 22px rgba(15, 23, 42, 0.08);
            border-color: #cbd5e1;
        }

        .footer-note {
            text-align: center;
            color: #667085;
            font-size: 14px;
        }

        .footer-note a {
            color: #f97316;
            font-weight: 800;
            text-decoration: none;
        }

        .signin-security {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 18px;
            color: #64748b;
            font-size: 12px;
            font-weight: 700;
        }

        /* Mobile Styles */
        @media (max-width: 1024px) {
            .signin-shell {
                max-width: 400px;
            }

            .signin-container {
                min-height: 100svh;
                padding: 12px 10px;
            }

            .signin-form-area {
                width: 100%;
                padding: 0;
            }

            .login-card {
                padding: 22px 18px;
                border-radius: 18px;
            }

            .logo-box {
                margin-bottom: 8px;
            }

            .welcome-text {
                font-size: 22px;
            }

            .sub-text {
                font-size: 12px;
                line-height: 1.45;
                max-width: 280px;
            }

            .form-header {
                margin-bottom: 18px;
            }

            .auth-chip {
                margin-bottom: 12px;
                padding: 7px 12px;
                font-size: 11px;
            }

            .input-group {
                margin-bottom: 14px;
            }

            .input-group label {
                margin-bottom: 6px;
                font-size: 12px;
            }

            .input-group input {
                padding: 12px 14px;
                font-size: 14px;
                border-radius: 12px;
            }

            .remember-forgot {
                margin-bottom: 16px;
                font-size: 12px;
            }

            .signin-button {
                padding: 12px;
                font-size: 15px;
                margin-bottom: 16px;
            }

            .social-divider {
                margin-bottom: 16px;
            }

            .social-btns {
                gap: 10px;
                margin-bottom: 16px;
            }

            .social-btn {
                padding: 10px;
                font-size: 13px;
            }

            .footer-note {
                font-size: 13px;
            }

            .signin-security {
                margin-top: 14px;
                font-size: 11px;
            }
        }

        @media (max-width: 576px) {
            .signin-container {
                min-height: 100svh;
                padding: 8px;
            }

            .signin-close {
                top: 8px;
                right: 8px;
                width: 40px;
                height: 40px;
            }

            .login-card {
                padding: 16px 14px;
                border-radius: 16px;
            }

            .logo-box {
                margin-bottom: 6px;
            }

            .welcome-text {
                font-size: 20px;
                margin-bottom: 6px;
            }

            .sub-text {
                font-size: 11px;
                line-height: 1.35;
                max-width: 250px;
            }

            .auth-chip {
                padding: 6px 10px;
                font-size: 10px;
                margin-bottom: 10px;
            }

            .form-header {
                margin-bottom: 14px;
            }

            .input-group {
                margin-bottom: 10px;
            }

            .input-group input {
                padding: 10px 12px;
                font-size: 13px;
            }

            .remember-forgot {
                margin-bottom: 12px;
                font-size: 11px;
                flex-direction: row;
                align-items: center;
                gap: 8px;
            }

            .signin-button {
                padding: 10px;
                font-size: 14px;
                margin-bottom: 12px;
            }

            .social-divider {
                margin-bottom: 12px;
            }

            .social-btns {
                flex-direction: row;
                gap: 8px;
                margin-bottom: 12px;
            }

            .social-btn {
                padding: 9px 8px;
                font-size: 12px;
            }

            .footer-note {
                font-size: 12px;
            }

            .signin-security {
                margin-top: 10px;
                font-size: 10px;
                gap: 6px;
            }
        }
    </style>
</head>

<body>
    <div class="signin-container">
        <div class="signin-shell">
            <div class="signin-form-area">
                <div class="login-card">
                    <button class="signin-close" type="button" aria-label="Close sign in" onclick="closeSigninPage()">
                        <i data-lucide="x" style="width:18px; height:18px;"></i>
                    </button>
                    <div class="form-header">
                        <div class="logo-box" style="display:block; text-align:center;">
                            <a href="index.html" style="text-decoration: none;">
                                <span class="logo-text"
                                    style="font-size: 26px; color: #0f172a;">Noshahi<span>Baba</span>.com</span>
                            </a>
                        </div>
                        <div class="auth-chip"><i data-lucide="shield-check" style="width:14px;"></i> Secure Sign In</div>
                        <div class="welcome-text">Welcome Back</div>
                        <div class="sub-text">Sign in to manage orders, track shipments, and continue sourcing with your business account.</div>
                    </div>

                    <form id="signinForm">
                        <div class="input-group">
                            <label>Email or Member ID</label>
                            <input type="text" placeholder="name@company.com" required>
                        </div>
                        <div class="input-group">
                            <label>Password</label>
                            <input type="password" placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢" required>
                        </div>

                        <div class="remember-forgot">
                            <label>
                                <input type="checkbox"> Remember me
                            </label>
                            <a href="#">Forgot password?</a>
                        </div>

                        <button type="submit" class="signin-button">Sign In</button>
                    </form>

                    <div class="social-divider">
                        <span>OR CONTINUE WITH</span>
                    </div>

                    <div class="social-btns">
                        <button class="social-btn">
                            <i data-lucide="chrome" style="width: 16px; margin-right: 8px;"></i> Google
                        </button>
                        <button class="social-btn">
                            <i data-lucide="facebook" style="width: 16px; margin-right: 8px;"></i> Facebook
                        </button>
                    </div>

                    <div class="footer-note">
                        Don't have an account? <a href="#">Join Free</a>
                    </div>

                    <div class="signin-security">
                        <i data-lucide="lock" style="width: 14px;"></i>
                        <span>Protected login with encrypted session security</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        lucide.createIcons();

        function closeSigninPage() {
            if (window.history.length > 1) {
                window.history.back();
                return;
            }
            window.location.href = 'index.html';
        }

        document.getElementById('signinForm').addEventListener('submit', function (e) {
            e.preventDefault();
            // Show a professional loading state would be next, but for demo:
            const btn = e.target.querySelector('button');
            btn.innerHTML = 'Signing in...';
            btn.style.opacity = '0.7';

            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);
        });
    </script>
    <script src="script.js"></script>
</body>

</html>
